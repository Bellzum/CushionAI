<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CushionAI Voice</title>
</head>
<body>
  <h1>CushionAI Vocal Bridge Demo</h1>
  <button id="connect">Connect Voice Agent</button>
  <button id="disconnect">Disconnect</button>
  <button id="send">Send Client Action</button>
  <script type="module" src="./app.js"></script>
  <script>
    document.getElementById("connect").onclick = window.connectAgent;
    document.getElementById("disconnect").onclick = window.disconnectAgent;
    document.getElementById("send").onclick = window.sendAction;
  </script>
</body>
</html>
